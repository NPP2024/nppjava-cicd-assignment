name: CICD project NPP

# TODO (Task 1): Run on pushes and pull requests.
on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # TODO (Task 2): Enable Maven dependency caching.
      - name: Build and run tests
        run: mvn -B verify

      # TODO (Task 3): Publish JUnit test reports.
      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: target/surefire-reports/

      # TODO (Task 4): Enforce JaCoCo coverage checks.
      - name: Verify build and coverage
        run: mvn verify

  # TODO (Task 5): Run Checkstyle in a separate job.
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Checkstyle
        run: mvn -B checkstyle:check

  # TODO (Task 6 - CD):
  # Add a docker job that:
  # - Depends on build-and-test and lint
  # - Runs only on pushes to master
  # - Builds and pushes the Docker image to Docker Hub
  # - Uses docker/build-push-action
  # - Logs in to Docker Hub using GitHub secrets
      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v4
        with:
                image: npp2024/java
                registry: docker.io
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
